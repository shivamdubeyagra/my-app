name: Continuous Deployment (Prod)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push my-app image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: shivamdubeyagra/my-app:${{ github.sha }}

      - name: Clone argo-deployment repo, update image tags, and push tags
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git clone https://github.com/shivamdubeyagra/argo-deployment.git
          cd argo-deployment

          sed -i 's|image: *shivamdubeyagra/my-app:[^ ]*|image: shivamdubeyagra/my-app:${{ github.sha }}|' manifest.yaml
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes to commit"
          git push https://${PAT}@github.com/shivamdubeyagra/argo-deployment.git main